<a
  class="cart-button"
  routerLink="/cart"
  routerLinkActive="is-active"
  [routerLinkActiveOptions]="{ exact: true }"
  #rla="routerLinkActive"
  [attr.aria-current]="rla.isActive ? 'page' : null"
  [attr.aria-label]="'Cart with ' + itemCount() + ' items'"
  data-testid="cart-button"
>
  <app-cart-icon class="cart-icon" />
  <span class="cart-label">Cart</span>
  <span class="cart-count" [class.is-hidden]="itemCount() === 0" data-testid="cart-badge">
    {{ itemCount() }}
  </span>
</a>
